# nginx site for the realm server: realm.gotchicloset.com -> 127.0.0.1:8792
#
# CRITICAL difference from gotchicloset's REST API site: the realm server is a
# WebSocket server, so the proxy MUST forward the Upgrade/Connection headers and
# use HTTP/1.1, or wss:// handshakes fail. certbot --nginx adds the 443 block.
#
# Install (on the VPS, via hPanel terminal — see deploy/README.md):
#   cp deploy/nginx-realm.conf /etc/nginx/sites-available/realm.gotchicloset.com
#   ln -sf /etc/nginx/sites-available/realm.gotchicloset.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d realm.gotchicloset.com --non-interactive --agree-tos -m <you@email>

server {
    listen 80;
    server_name realm.gotchicloset.com;

    location / {
        proxy_pass http://127.0.0.1:8792;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep long-lived WebSocket connections open (default is 60s).
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
